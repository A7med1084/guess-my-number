<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="style.css?v=2" />
    <link rel="stylesheet" href="css/all.min.css" />
    <link rel="icon" href="images/icon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <title>Guess My Number</title>
  </head>
  <body>
    <header>
      <button class="restart">Again!</button>
      <p>(Between 1 and 100)</p>
    </header>
    <h1>Guess My Number!</h1>
    <div class="container">
      <span class="number">?</span>
    </div>
    <main>
      <section class="myform">
        <input class="num" id="num" type="number" min="1" max="100" required />
        <button type="button" class="btn">Check!</button>
      </section>
      <section class="right">
        <h4 class="hint">Start guessing...</h4>
        <ul>
          <li>
            <i class="fa-solid fa-star"></i>
            Score: <span class="score">20</span>
          </li>
          <li>
            <i class="fa-solid fa-bolt"></i>
            Highscore: <span class="highscore">0</span>
          </li>
        </ul>
      </section>
    </main>
    <br>
    <br>
    <br>
    <br>
    <br>
    <script src="script.js"></script>
    <script src="script.js?v=2"></script>
  </body>
</html>
